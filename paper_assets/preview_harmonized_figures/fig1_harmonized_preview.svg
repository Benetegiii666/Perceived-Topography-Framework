<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 760" width="1400" height="760">
  <title>Figure 1 — From Agent Fear to Landscape Design</title>
  <desc>The question is not only whether the agent is dangerous. The better question is what landscape we asked it to move through.</desc>

  <rect width="1400" height="760" fill="#F7F2E8"/>
  <text x="700" y="45" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#2B2A24" text-anchor="middle">From Agent Fear to Landscape Design</text>

  <!-- Vertical divider -->
  <line x1="700" y1="75" x2="700" y2="620" stroke="#8B8575" stroke-width="1" opacity="0.3"/>

  <!-- ====== LEFT PANEL: Agent Fear Frame ====== -->
  <text x="350" y="90" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#A65E3A" text-anchor="middle">Agent Fear Frame</text>

  <!-- Box/containment visual -->
  <rect x="180" y="120" width="340" height="420" rx="8" fill="none" stroke="#A65E3A" stroke-width="3" stroke-dasharray="10,5"/>

  <!-- Agent node inside box -->
  <rect x="260" y="160" width="180" height="60" rx="10" fill="#FAF7F0" stroke="#2B2A24" stroke-width="2"/>
  <text x="350" y="196" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#2B2A24" text-anchor="middle">Agent</text>
  <text x="350" y="235" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8B8575" text-anchor="middle">isolated actor</text>

  <line x1="350" y1="245" x2="350" y2="268" stroke="#2B2A24" stroke-width="1.5"/>
  <polygon points="350,275 344,265 356,265" fill="#2B2A24"/>

  <!-- Box emphasis -->
  <rect x="235" y="280" width="230" height="55" rx="8" fill="#FAF7F0" stroke="#A65E3A" stroke-width="1.5"/>
  <text x="350" y="305" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#A65E3A" text-anchor="middle">Box / containment</text>
  <text x="350" y="322" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#A65E3A" text-anchor="middle">emphasis</text>

  <line x1="350" y1="335" x2="350" y2="358" stroke="#2B2A24" stroke-width="1.5"/>
  <polygon points="350,365 344,355 356,355" fill="#2B2A24"/>

  <!-- Focus -->
  <rect x="235" y="370" width="230" height="55" rx="8" fill="#FAF7F0" stroke="#8B8575" stroke-width="1.5"/>
  <text x="350" y="395" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#2B2A24" text-anchor="middle">Focus on model</text>
  <text x="350" y="412" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#2B2A24" text-anchor="middle">behavior alone</text>

  <line x1="350" y1="425" x2="350" y2="448" stroke="#2B2A24" stroke-width="1.5"/>
  <polygon points="350,455 344,445 356,445" fill="#2B2A24"/>

  <!-- Question -->
  <text x="350" y="480" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" fill="#A65E3A" text-anchor="middle" font-style="italic">What is wrong</text>
  <text x="350" y="498" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" fill="#A65E3A" text-anchor="middle" font-style="italic">with the agent?</text>

  <!-- ====== RIGHT PANEL: Topography Design Frame ====== -->
  <text x="1050" y="90" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#6F7F3A" text-anchor="middle">Topography Design Frame</text>

  <!-- Landscape background -->
  <rect x="780" y="120" width="480" height="420" rx="20" fill="#EFE6D6" stroke="#6F7F3A" stroke-width="1.5"/>

  <!-- Contour lines for landscape feel -->
  <path d="M 800 200 Q 950 170 1100 200 Q 1200 220 1240 195" fill="none" stroke="#6F7F3A" stroke-width="0.6" opacity="0.15"/>
  <path d="M 800 300 Q 920 270 1060 295 Q 1180 320 1240 290" fill="none" stroke="#6F7F3A" stroke-width="0.6" opacity="0.12"/>
  <path d="M 800 400 Q 940 375 1080 395 Q 1190 415 1240 390" fill="none" stroke="#6F7F3A" stroke-width="0.5" opacity="0.10"/>

  <!-- Agent embedded in landscape -->
  <rect x="830" y="150" width="160" height="55" rx="10" fill="#FAF7F0" stroke="#6F7F3A" stroke-width="2"/>
  <text x="910" y="183" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2B2A24" text-anchor="middle">Optimizer</text>

  <!-- Path through landscape -->
  <path d="M 910 205 Q 950 230 1000 250 Q 1060 275 1050 320 Q 1040 365 1080 400 Q 1120 430 1150 460" fill="none" stroke="#7C9A63" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="1155,465 1145,455 1153,453" fill="#7C9A63"/>

  <!-- Landscape elements along path -->
  <rect x="960" y="225" width="130" height="30" rx="15" fill="#FAF7F0" stroke="#6F7F3A" stroke-width="1" opacity="0.9"/>
  <text x="1025" y="245" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#6F7F3A" text-anchor="middle">visible policies</text>

  <rect x="1020" y="270" width="130" height="30" rx="15" fill="#FAF7F0" stroke="#6F7F3A" stroke-width="1" opacity="0.9"/>
  <text x="1085" y="290" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#6F7F3A" text-anchor="middle">available tools</text>

  <rect x="990" y="315" width="130" height="30" rx="15" fill="#FAF7F0" stroke="#6F7F3A" stroke-width="1" opacity="0.9"/>
  <text x="1055" y="335" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#6F7F3A" text-anchor="middle">evidence paths</text>

  <rect x="1030" y="360" width="130" height="30" rx="15" fill="#FAF7F0" stroke="#6F7F3A" stroke-width="1" opacity="0.9"/>
  <text x="1095" y="380" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#6F7F3A" text-anchor="middle">approval gates</text>

  <rect x="1070" y="405" width="130" height="30" rx="15" fill="#FAF7F0" stroke="#7C9A63" stroke-width="1" opacity="0.9"/>
  <text x="1135" y="425" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#7C9A63" text-anchor="middle">prior learning</text>

  <!-- Policy guardrail -->
  <path d="M 790 130 Q 790 340 800 540" fill="none" stroke="#8B8575" stroke-width="2.5" stroke-dasharray="10,5" stroke-linecap="round"/>
  <path d="M 1250 130 Q 1250 340 1240 540" fill="none" stroke="#8B8575" stroke-width="2.5" stroke-dasharray="10,5" stroke-linecap="round"/>

  <!-- Question -->
  <text x="1050" y="490" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" fill="#6F7F3A" text-anchor="middle" font-style="italic">What landscape</text>
  <text x="1050" y="508" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" fill="#6F7F3A" text-anchor="middle" font-style="italic">shapes behavior?</text>

  <!-- Caption -->
  <text x="700" y="670" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8B8575" text-anchor="middle" font-style="italic">The question is not only whether the agent is dangerous.</text>
  <text x="700" y="690" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8B8575" text-anchor="middle" font-style="italic">The better question is what landscape we asked it to move through.</text>

  <!-- Compact legend -->
  <text x="350" y="730" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8B8575" text-anchor="middle">▪ Dashed border = containment boundary</text>
  <text x="1050" y="730" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8B8575" text-anchor="middle">▪ Green path = shaped movement through topography</text>
</svg>
