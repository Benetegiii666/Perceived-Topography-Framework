<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" width="1400" height="820">
  <title>Figure 4 — Motion and Premature Sufficiency</title>
  <desc>Many failures happen when the system reaches sufficiency too early. Normal motion includes investigation, evidence, and policy checks. Premature sufficiency skips these steps and produces unsupported claims or unsafe actions.</desc>

  <rect width="1400" height="820" fill="#F7F9FC"/>
  <text x="700" y="42" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#102033" text-anchor="middle">Motion and Premature Sufficiency</text>

  <!-- ====== NORMAL PATH (top) ====== -->
  <text x="700" y="90" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" fill="#2E8B57" text-anchor="middle" font-weight="bold">Normal Motion Path</text>

  <!-- Attraction -->
  <rect x="80" y="120" width="200" height="65" rx="12" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="180" y="158" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#102033" text-anchor="middle">Attraction</text>

  <line x1="280" y1="152" x2="340" y2="152" stroke="#102033" stroke-width="2"/>
  <polygon points="347,152 337,146 337,158" fill="#102033"/>

  <!-- Investigation -->
  <rect x="350" y="120" width="200" height="65" rx="12" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="450" y="158" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#102033" text-anchor="middle">Investigation</text>

  <line x1="550" y1="152" x2="610" y2="152" stroke="#102033" stroke-width="2"/>
  <polygon points="617,152 607,146 607,158" fill="#102033"/>

  <!-- Sufficiency -->
  <rect x="620" y="120" width="200" height="65" rx="12" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="720" y="158" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#102033" text-anchor="middle">Sufficiency</text>

  <line x1="820" y1="152" x2="880" y2="152" stroke="#102033" stroke-width="2"/>
  <polygon points="887,152 877,146 877,158" fill="#102033"/>

  <!-- Action (normal) -->
  <rect x="890" y="120" width="200" height="65" rx="12" fill="#2E8B57" stroke="#2E8B57" stroke-width="2.5"/>
  <text x="990" y="158" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Action</text>

  <!-- Intervention points along normal path -->
  <rect x="310" y="210" width="150" height="30" rx="15" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="1" opacity="0.9"/>
  <text x="385" y="230" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#2E5EAA" text-anchor="middle">evidence needed</text>
  <line x1="385" y1="210" x2="420" y2="185" stroke="#2E5EAA" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <rect x="440" y="250" width="130" height="30" rx="15" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="1" opacity="0.9"/>
  <text x="505" y="270" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#2E5EAA" text-anchor="middle">policy check</text>
  <line x1="505" y1="250" x2="480" y2="185" stroke="#2E5EAA" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <rect x="560" y="210" width="180" height="30" rx="15" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="1" opacity="0.9"/>
  <text x="650" y="230" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#2E5EAA" text-anchor="middle">confidence calibration</text>
  <line x1="650" y1="210" x2="680" y2="185" stroke="#2E5EAA" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <rect x="700" y="250" width="160" height="30" rx="15" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="1" opacity="0.9"/>
  <text x="780" y="270" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#2E5EAA" text-anchor="middle">human approval</text>
  <line x1="780" y1="250" x2="750" y2="185" stroke="#2E5EAA" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <rect x="850" y="210" width="170" height="30" rx="15" fill="#FFFFFF" stroke="#2E8B57" stroke-width="1" opacity="0.9"/>
  <text x="935" y="230" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#2E8B57" text-anchor="middle">prior model update</text>
  <line x1="935" y1="210" x2="950" y2="185" stroke="#2E8B57" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <rect x="1000" y="250" width="150" height="30" rx="15" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="1" opacity="0.9"/>
  <text x="1075" y="270" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#2E5EAA" text-anchor="middle">escalation option</text>
  <line x1="1040" y1="250" x2="990" y2="185" stroke="#2E5EAA" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ====== DIVIDER ====== -->
  <line x1="80" y1="330" x2="1320" y2="330" stroke="#8A94A6" stroke-width="0.6" opacity="0.3"/>

  <!-- ====== FAILURE SHORTCUT (bottom) ====== -->
  <text x="700" y="370" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" fill="#B94A48" text-anchor="middle" font-weight="bold">Failure Shortcut: Premature Sufficiency</text>

  <!-- Attraction (repeated as starting point) -->
  <rect x="80" y="410" width="200" height="65" rx="12" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="180" y="448" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#102033" text-anchor="middle">Attraction</text>

  <!-- Failure arrow (skips investigation) -->
  <path d="M 280 442 Q 420 442 550 460 Q 680 478 700 500" fill="none" stroke="#B94A48" stroke-width="2.5" stroke-dasharray="10,5"/>
  <polygon points="703,507 693,497 703,495" fill="#B94A48"/>

  <!-- Skip label -->
  <text x="470" y="430" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#B94A48" text-anchor="middle" font-style="italic">skips investigation</text>

  <!-- Premature Sufficiency -->
  <rect x="600" y="500" width="250" height="65" rx="12" fill="#FFFFFF" stroke="#B94A48" stroke-width="2.5"/>
  <text x="725" y="530" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#B94A48" text-anchor="middle">Premature</text>
  <text x="725" y="550" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#B94A48" text-anchor="middle">Sufficiency</text>

  <line x1="850" y1="532" x2="920" y2="532" stroke="#B94A48" stroke-width="2"/>
  <polygon points="927,532 917,526 917,538" fill="#B94A48"/>

  <!-- Unsafe Action -->
  <rect x="930" y="500" width="280" height="65" rx="12" fill="#B94A48" stroke="#B94A48" stroke-width="2.5"/>
  <text x="1070" y="530" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Unsupported /</text>
  <text x="1070" y="550" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Unsafe Action</text>

  <!-- Failure explanation -->
  <text x="850" y="610" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#B94A48" text-anchor="middle" font-style="italic">Insufficient grounding, weak policy,</text>
  <text x="850" y="628" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#B94A48" text-anchor="middle" font-style="italic">misplaced confidence</text>

  <!-- Caption -->
  <text x="700" y="700" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">Many failures happen when the system reaches sufficiency too early.</text>
  <text x="700" y="720" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">Normal motion includes investigation, evidence, and policy checks.</text>
  <text x="700" y="740" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">Premature sufficiency skips these steps and produces unsupported claims or unsafe actions.</text>

  <!-- Compact legend -->
  <text x="300" y="785" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">▪ Green = grounded action    ▪ Red = premature/unsafe    ▪ Dashed = failure shortcut</text>
</svg>
