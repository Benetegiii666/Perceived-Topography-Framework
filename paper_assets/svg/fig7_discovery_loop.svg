<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" width="1000" height="620">
  <title>Figure 6 — Discovery Loop</title>
  <desc>Discovery converts tacit human reasoning into reusable reasoning surfaces through a Retrieve-Infer-Propose-Confirm loop. Inference is provisional. Confirmation can correct, reject, qualify, or bound. Reuse and future topography are downstream consequences, not Discovery stages.</desc>

  <rect width="1000" height="620" fill="#F7F9FC"/>
  <text x="500" y="36" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#102033" text-anchor="middle">Discovery Loop</text>

  <!-- ====== INPUT: Existing Information Surfaces ====== -->
  <rect x="60" y="70" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="160" y="92" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#8A94A6" text-anchor="middle">Existing Information</text>
  <text x="160" y="108" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#8A94A6" text-anchor="middle">Surfaces</text>

  <!-- ====== INPUT: Tacit Human Reasoning ====== -->
  <ellipse cx="160" cy="180" rx="100" ry="36" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="160" y="174" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#8A94A6" text-anchor="middle">Tacit Human</text>
  <text x="160" y="190" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#8A94A6" text-anchor="middle">Reasoning</text>

  <!-- Arrow from inputs to Retrieve -->
  <line x1="260" y1="95" x2="310" y2="155" stroke="#8A94A6" stroke-width="1.5"/>
  <line x1="260" y1="180" x2="310" y2="165" stroke="#8A94A6" stroke-width="1.5"/>
  <polygon points="315,158 305,150 305,162" fill="#8A94A6"/>

  <!-- ====== CORE DISCOVERY LOOP (enclosed in rounded rect) ====== -->
  <rect x="300" y="80" width="480" height="200" rx="16" fill="none" stroke="#2E5EAA" stroke-width="2" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="540" y="100" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" font-weight="bold" fill="#2E5EAA" text-anchor="middle" opacity="0.6">CANONICAL DISCOVERY LOOP</text>

  <!-- Retrieve -->
  <rect x="320" y="130" width="110" height="55" rx="10" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="375" y="162" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Retrieve</text>
  <text x="375" y="118" font-family="Inter, Helvetica, Arial, sans-serif" font-size="10" fill="#8A94A6" text-anchor="middle">artifacts, policies,</text>
  <text x="375" y="128" font-family="Inter, Helvetica, Arial, sans-serif" font-size="10" fill="#8A94A6" text-anchor="middle">prior reasoning</text>

  <line x1="430" y1="158" x2="455" y2="158" stroke="#102033" stroke-width="2"/>
  <polygon points="460,158 452,152 452,164" fill="#102033"/>

  <!-- Infer -->
  <rect x="462" y="130" width="110" height="55" rx="10" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="517" y="162" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Infer</text>
  <text x="517" y="118" font-family="Inter, Helvetica, Arial, sans-serif" font-size="10" fill="#D89A21" text-anchor="middle" font-style="italic">provisional</text>
  <text x="517" y="128" font-family="Inter, Helvetica, Arial, sans-serif" font-size="10" fill="#D89A21" text-anchor="middle" font-style="italic">hypothesis</text>

  <line x1="572" y1="158" x2="597" y2="158" stroke="#102033" stroke-width="2"/>
  <polygon points="602,158 594,152 594,164" fill="#102033"/>

  <!-- Propose -->
  <rect x="604" y="130" width="110" height="55" rx="10" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="659" y="162" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Propose</text>
  <text x="659" y="118" font-family="Inter, Helvetica, Arial, sans-serif" font-size="10" fill="#8A94A6" text-anchor="middle">visible,</text>
  <text x="659" y="128" font-family="Inter, Helvetica, Arial, sans-serif" font-size="10" fill="#8A94A6" text-anchor="middle">correctable</text>

  <!-- Arrow down from Propose to Confirm -->
  <line x1="659" y1="185" x2="659" y2="220" stroke="#102033" stroke-width="2"/>
  <polygon points="659,227 653,219 665,219" fill="#102033"/>

  <!-- Confirm (highlighted with gold border) -->
  <rect x="580" y="230" width="158" height="55" rx="10" fill="#FFF8E7" stroke="#D89A21" stroke-width="2.5"/>
  <text x="659" y="252" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Confirm</text>
  <text x="659" y="270" font-family="Inter, Helvetica, Arial, sans-serif" font-size="10" fill="#D89A21" text-anchor="middle">correct · reject · qualify · bound</text>

  <!-- Re-entry arrow from Confirm back to Retrieve -->
  <path d="M 580,258 L 340,258 L 340,185" fill="none" stroke="#D89A21" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="340,185 334,193 346,193" fill="#D89A21"/>
  <text x="440" y="248" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#D89A21" text-anchor="middle" font-style="italic">new uncertainty</text>

  <!-- ====== DOWNSTREAM ZONE (visually separated) ====== -->
  <line x1="100" y1="330" x2="900" y2="330" stroke="#8A94A6" stroke-width="0.8" opacity="0.3"/>
  <text x="500" y="355" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#8A94A6" text-anchor="middle" opacity="0.7">DOWNSTREAM CONSEQUENCES</text>

  <!-- Arrow from Confirm to downstream -->
  <line x1="738" y1="258" x2="820" y2="258" stroke="#102033" stroke-width="1.5"/>
  <line x1="820" y1="258" x2="820" y2="370" stroke="#102033" stroke-width="1.5"/>
  <polygon points="820,377 814,369 826,369" fill="#102033"/>

  <!-- Reusable Reasoning Surface -->
  <rect x="720" y="380" width="200" height="55" rx="12" fill="#E8F5E9" stroke="#2E8B57" stroke-width="2"/>
  <text x="820" y="402" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#102033" text-anchor="middle">Reusable Reasoning</text>
  <text x="820" y="420" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#102033" text-anchor="middle">Surface</text>

  <!-- Scope/Confidence/Provenance/Boundary labels -->
  <text x="820" y="450" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#2E8B57" text-anchor="middle">scope · confidence · provenance · applicability boundary</text>

  <!-- Arrow from Reusable Reasoning to Future Topography -->
  <line x1="820" y1="460" x2="820" y2="485" stroke="#2E8B57" stroke-width="1.5"/>
  <polygon points="820,492 814,484 826,484" fill="#2E8B57"/>

  <!-- Future Topography -->
  <rect x="720" y="495" width="200" height="50" rx="12" fill="#F0F4FF" stroke="#2E5EAA" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="820" y="518" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#2E5EAA" text-anchor="middle">Future Topography</text>
  <text x="820" y="534" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#8A94A6" text-anchor="middle">visible · accessible · represented · trusted · connected</text>

  <!-- Downstream consequence boxes: Generate, Preserve, Learn (smaller, muted) -->
  <rect x="100" y="380" width="130" height="40" rx="8" fill="#F7F9FC" stroke="#8A94A6" stroke-width="1" opacity="0.6"/>
  <text x="165" y="404" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Generate</text>

  <rect x="260" y="380" width="130" height="40" rx="8" fill="#F7F9FC" stroke="#8A94A6" stroke-width="1" opacity="0.6"/>
  <text x="325" y="404" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Preserve</text>

  <rect x="420" y="380" width="130" height="40" rx="8" fill="#F7F9FC" stroke="#8A94A6" stroke-width="1" opacity="0.6"/>
  <text x="485" y="404" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Learn</text>

  <text x="325" y="440" font-family="Inter, Helvetica, Arial, sans-serif" font-size="9" fill="#8A94A6" text-anchor="middle" font-style="italic">covered by Sections 5, 6, and 8</text>

  <!-- ====== CAPTION ====== -->
  <text x="500" y="570" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">Discovery reduces user burden by retrieving and inferring before asking.</text>
  <text x="500" y="588" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">Inferred reasoning is provisional. Confirmation is not passive approval.</text>
  <text x="500" y="606" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">Confirmed reasoning becomes a reusable surface that shapes future topography.</text>
</svg>
