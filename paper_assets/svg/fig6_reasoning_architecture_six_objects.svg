<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" width="1400" height="820">
  <title>Figure 6 — Reasoning Architecture: Six Objects Preserve the State Transition</title>
  <desc>The unit of organizational reasoning is not the document. It is the optimizer state transition. Documents provide evidence and context. Reasoning objects preserve how that evidence shaped action and learning.</desc>

  <rect width="1400" height="820" fill="#F7F9FC"/>

  <!-- Title -->
  <text x="700" y="40" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#102033" text-anchor="middle">Reasoning Architecture</text>
  <text x="700" y="68" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" fill="#8A94A6" text-anchor="middle">Six Objects Preserve the State Transition</text>

  <!-- ========================================= -->
  <!-- TOP ROW: State transition description -->
  <!-- ========================================= -->

  <text x="130" y="115" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">what was</text>
  <text x="130" y="130" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">believed</text>

  <text x="355" y="115" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">why it was</text>
  <text x="355" y="130" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">believed</text>

  <text x="580" y="115" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">what was</text>
  <text x="580" y="130" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">chosen</text>

  <text x="810" y="115" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">what was</text>
  <text x="810" y="130" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">tested</text>

  <text x="1040" y="115" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">what</text>
  <text x="1040" y="130" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">changed</text>

  <text x="1270" y="122" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">reusable</text>

  <!-- Thin connecting line across top -->
  <line x1="60" y1="140" x2="1340" y2="140" stroke="#8A94A6" stroke-width="0.8" opacity="0.3"/>

  <!-- ========================================= -->
  <!-- MAIN CHAIN: Six Reasoning Objects -->
  <!-- ========================================= -->

  <!-- Object 1: Optimizer State -->
  <rect x="40" y="160" width="180" height="120" rx="14" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="130" y="195" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Optimizer</text>
  <text x="130" y="213" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">State</text>
  <text x="130" y="240" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Goal, Policy,</text>
  <text x="130" y="254" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Interpretation</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="220" x2="258" y2="220" stroke="#102033" stroke-width="2"/>
  <polygon points="265,220 255,214 255,226" fill="#102033"/>

  <!-- Object 2: Premise Stack -->
  <rect x="268" y="160" width="180" height="120" rx="14" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="358" y="195" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Premise</text>
  <text x="358" y="213" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Stack</text>
  <text x="358" y="240" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Why the action</text>
  <text x="358" y="254" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">seemed reasonable</text>

  <!-- Arrow 2→3 -->
  <line x1="448" y1="220" x2="486" y2="220" stroke="#102033" stroke-width="2"/>
  <polygon points="493,220 483,214 483,226" fill="#102033"/>

  <!-- Object 3: Decision State -->
  <rect x="496" y="160" width="180" height="120" rx="14" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="586" y="195" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Decision</text>
  <text x="586" y="213" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">State</text>
  <text x="586" y="240" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">What was chosen,</text>
  <text x="586" y="254" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">why sufficient</text>

  <!-- Arrow 3→4 -->
  <line x1="676" y1="220" x2="714" y2="220" stroke="#102033" stroke-width="2"/>
  <polygon points="721,220 711,214 711,226" fill="#102033"/>

  <!-- Object 4: Investigation Trace -->
  <rect x="724" y="160" width="180" height="120" rx="14" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="814" y="195" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Investigation</text>
  <text x="814" y="213" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Trace</text>
  <text x="814" y="240" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">How uncertainty</text>
  <text x="814" y="254" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">was reduced</text>

  <!-- Arrow 4→5 -->
  <line x1="904" y1="220" x2="942" y2="220" stroke="#102033" stroke-width="2"/>
  <polygon points="949,220 939,214 939,226" fill="#102033"/>

  <!-- Object 5: Learning Event -->
  <rect x="952" y="160" width="180" height="120" rx="14" fill="#FFFFFF" stroke="#D89A21" stroke-width="2.5"/>
  <text x="1042" y="195" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Learning</text>
  <text x="1042" y="213" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Event</text>
  <text x="1042" y="240" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Where reality</text>
  <text x="1042" y="254" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">contradicted</text>

  <!-- Arrow 5→6 -->
  <line x1="1132" y1="220" x2="1170" y2="220" stroke="#102033" stroke-width="2"/>
  <polygon points="1177,220 1167,214 1167,226" fill="#102033"/>

  <!-- Object 6: Model Update Object -->
  <rect x="1180" y="160" width="180" height="120" rx="14" fill="#FFFFFF" stroke="#2E8B57" stroke-width="2.5"/>
  <text x="1270" y="195" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Model Update</text>
  <text x="1270" y="213" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Object</text>
  <text x="1270" y="240" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Reusable change</text>
  <text x="1270" y="254" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">for future reasoning</text>

  <!-- Feedback arrow: MUO loops back to Optimizer State -->
  <path d="M 1270 280 Q 1270 330 1100 340 Q 700 350 300 340 Q 130 335 130 280" fill="none" stroke="#2E8B57" stroke-width="1.5" stroke-dasharray="8,4"/>
  <polygon points="130,280 124,290 136,290" fill="#2E8B57"/>
  <text x="700" y="365" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#2E8B57" text-anchor="middle" font-style="italic">Learning reshapes future optimizer state</text>

  <!-- ========================================= -->
  <!-- DIVIDER -->
  <!-- ========================================= -->

  <line x1="60" y1="400" x2="1340" y2="400" stroke="#8A94A6" stroke-width="0.8" opacity="0.3"/>

  <!-- ========================================= -->
  <!-- BOTTOM: Source Artifacts -->
  <!-- ========================================= -->

  <text x="700" y="430" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#8A94A6" text-anchor="middle">Source Artifacts</text>
  <text x="700" y="450" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle" font-style="italic">Documents provide evidence and context — they support reasoning, but do not preserve it</text>

  <!-- Artifact pills -->
  <rect x="120" y="475" width="150" height="38" rx="19" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1.2"/>
  <text x="195" y="499" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle">documents</text>

  <rect x="305" y="475" width="130" height="38" rx="19" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1.2"/>
  <text x="370" y="499" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle">policies</text>

  <rect x="470" y="475" width="150" height="38" rx="19" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1.2"/>
  <text x="545" y="499" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle">dashboards</text>

  <rect x="655" y="475" width="110" height="38" rx="19" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1.2"/>
  <text x="710" y="499" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle">notes</text>

  <rect x="800" y="475" width="160" height="38" rx="19" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1.2"/>
  <text x="880" y="499" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle">postmortems</text>

  <rect x="995" y="475" width="130" height="38" rx="19" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1.2"/>
  <text x="1060" y="499" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle">metrics</text>

  <!-- Dashed arrows from artifacts up to relevant reasoning objects -->
  <!-- documents → Premise Stack -->
  <path d="M 195 475 Q 195 420 300 395 Q 358 385 358 280" fill="none" stroke="#8A94A6" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- policies → Optimizer State + Decision State -->
  <path d="M 370 475 Q 250 420 130 280" fill="none" stroke="#8A94A6" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <path d="M 370 475 Q 470 420 586 280" fill="none" stroke="#8A94A6" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- dashboards → Investigation Trace -->
  <path d="M 545 475 Q 680 420 814 280" fill="none" stroke="#8A94A6" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- notes → Premise Stack + Decision State -->
  <path d="M 710 475 Q 550 420 358 280" fill="none" stroke="#8A94A6" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- postmortems → Learning Event -->
  <path d="M 880 475 Q 960 420 1042 280" fill="none" stroke="#8A94A6" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- metrics → Investigation Trace + Learning Event -->
  <path d="M 1060 475 Q 940 420 814 280" fill="none" stroke="#8A94A6" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  <path d="M 1060 475 Q 1050 420 1042 280" fill="none" stroke="#8A94A6" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- ========================================= -->
  <!-- CONTRAST STATEMENT -->
  <!-- ========================================= -->

  <rect x="200" y="560" width="1000" height="50" rx="10" fill="#FFFFFF" stroke="#102033" stroke-width="1.5"/>
  <text x="700" y="585" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" fill="#102033" text-anchor="middle">
    The unit of organizational reasoning is not the document.
  </text>
  <text x="700" y="603" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" fill="#102033" text-anchor="middle" font-weight="bold">
    It is the optimizer state transition.
  </text>

  <!-- Caption -->
  <text x="700" y="660" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">Documents provide evidence and context.</text>
  <text x="700" y="678" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">Reasoning objects preserve how that evidence shaped action and learning.</text>

  <!-- ========================================= -->
  <!-- LEGEND -->
  <!-- ========================================= -->

  <line x1="100" y1="730" x2="130" y2="730" stroke="#102033" stroke-width="2"/>
  <polygon points="137,730 127,724 127,736" fill="#102033"/>
  <text x="150" y="735" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8A94A6">State transition</text>

  <line x1="320" y1="730" x2="370" y2="730" stroke="#8A94A6" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="383" y="735" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8A94A6">Evidence / context support</text>

  <line x1="600" y1="730" x2="650" y2="730" stroke="#2E8B57" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="663" y="735" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8A94A6">Learning feedback</text>

  <rect x="850" y="720" width="20" height="20" rx="4" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="883" y="735" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8A94A6">Reasoning object</text>

  <rect x="1060" y="720" width="20" height="20" rx="10" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1.2"/>
  <text x="1093" y="735" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8A94A6">Source artifact</text>

</svg>
