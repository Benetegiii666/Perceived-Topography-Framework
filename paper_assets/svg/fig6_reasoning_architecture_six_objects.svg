<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" width="1400" height="820">
  <title>Figure 6 — Reasoning Architecture: Six Objects Preserve the State Transition</title>
  <desc>The unit of organizational reasoning is not the document. It is the optimizer state transition. Documents provide evidence and context. Reasoning objects preserve how that evidence shaped action and learning.</desc>

  <rect width="1400" height="820" fill="#F7F9FC"/>

  <!-- Title -->
  <text x="700" y="40" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#102033" text-anchor="middle">Reasoning Architecture</text>
  <text x="700" y="65" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" fill="#8A94A6" text-anchor="middle">Six Objects Preserve the State Transition</text>

  <!-- ========================================= -->
  <!-- TOP ROW: State transition descriptions -->
  <!-- with downward connector lines to objects  -->
  <!-- ========================================= -->

  <!-- what was believed → Optimizer State -->
  <text x="130" y="105" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8A94A6" text-anchor="middle" font-style="italic">what was believed</text>
  <line x1="130" y1="112" x2="130" y2="155" stroke="#8A94A6" stroke-width="0.8" opacity="0.4"/>

  <!-- why it was believed → Premise Stack -->
  <text x="358" y="105" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8A94A6" text-anchor="middle" font-style="italic">why it was believed</text>
  <line x1="358" y1="112" x2="358" y2="155" stroke="#8A94A6" stroke-width="0.8" opacity="0.4"/>

  <!-- what was chosen → Decision State -->
  <text x="586" y="105" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8A94A6" text-anchor="middle" font-style="italic">what was chosen</text>
  <line x1="586" y1="112" x2="586" y2="155" stroke="#8A94A6" stroke-width="0.8" opacity="0.4"/>

  <!-- what was tested → Investigation Trace -->
  <text x="814" y="105" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8A94A6" text-anchor="middle" font-style="italic">what was tested</text>
  <line x1="814" y1="112" x2="814" y2="155" stroke="#8A94A6" stroke-width="0.8" opacity="0.4"/>

  <!-- what changed → Learning Event + MUO -->
  <text x="1156" y="105" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8A94A6" text-anchor="middle" font-style="italic">what changed</text>
  <line x1="1110" y1="112" x2="1042" y2="155" stroke="#8A94A6" stroke-width="0.8" opacity="0.4"/>
  <line x1="1200" y1="112" x2="1270" y2="155" stroke="#8A94A6" stroke-width="0.8" opacity="0.4"/>

  <!-- ========================================= -->
  <!-- MAIN CHAIN: Six Reasoning Objects -->
  <!-- ========================================= -->

  <!-- Object 1: Optimizer State -->
  <rect x="40" y="158" width="180" height="115" rx="14" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="130" y="192" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Optimizer</text>
  <text x="130" y="210" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">State</text>
  <text x="130" y="236" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Goal, Policy,</text>
  <text x="130" y="250" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Interpretation</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="216" x2="261" y2="216" stroke="#102033" stroke-width="2"/>
  <polygon points="268,216 258,210 258,222" fill="#102033"/>

  <!-- Object 2: Premise Stack -->
  <rect x="268" y="158" width="180" height="115" rx="14" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="358" y="192" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Premise</text>
  <text x="358" y="210" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Stack</text>
  <text x="358" y="236" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Why the action</text>
  <text x="358" y="250" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">seemed reasonable</text>

  <!-- Arrow 2→3 -->
  <line x1="448" y1="216" x2="489" y2="216" stroke="#102033" stroke-width="2"/>
  <polygon points="496,216 486,210 486,222" fill="#102033"/>

  <!-- Object 3: Decision State -->
  <rect x="496" y="158" width="180" height="115" rx="14" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="586" y="192" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Decision</text>
  <text x="586" y="210" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">State</text>
  <text x="586" y="236" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">What was chosen,</text>
  <text x="586" y="250" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">why sufficient</text>

  <!-- Arrow 3→4 -->
  <line x1="676" y1="216" x2="717" y2="216" stroke="#102033" stroke-width="2"/>
  <polygon points="724,216 714,210 714,222" fill="#102033"/>

  <!-- Object 4: Investigation Trace -->
  <rect x="724" y="158" width="180" height="115" rx="14" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="814" y="192" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Investigation</text>
  <text x="814" y="210" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Trace</text>
  <text x="814" y="236" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">How uncertainty</text>
  <text x="814" y="250" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">was reduced</text>

  <!-- Arrow 4→5 -->
  <line x1="904" y1="216" x2="945" y2="216" stroke="#102033" stroke-width="2"/>
  <polygon points="952,216 942,210 942,222" fill="#102033"/>

  <!-- Object 5: Learning Event -->
  <rect x="952" y="158" width="180" height="115" rx="14" fill="#FFFFFF" stroke="#D89A21" stroke-width="2.5"/>
  <text x="1042" y="192" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Learning</text>
  <text x="1042" y="210" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Event</text>
  <text x="1042" y="236" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Where reality</text>
  <text x="1042" y="250" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">contradicted</text>

  <!-- Arrow 5→6 -->
  <line x1="1132" y1="216" x2="1173" y2="216" stroke="#102033" stroke-width="2"/>
  <polygon points="1180,216 1170,210 1170,222" fill="#102033"/>

  <!-- Object 6: Model Update Object -->
  <rect x="1180" y="158" width="180" height="115" rx="14" fill="#FFFFFF" stroke="#2E8B57" stroke-width="2.5"/>
  <text x="1270" y="192" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Model Update</text>
  <text x="1270" y="210" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Object</text>
  <text x="1270" y="236" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">Reusable change</text>
  <text x="1270" y="250" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">for future reasoning</text>

  <!-- Smoothed feedback arrow: MUO → Optimizer State -->
  <path d="M 1270 273 C 1270 340, 700 355, 130 340 C 90 338, 90 310, 130 273" fill="none" stroke="#2E8B57" stroke-width="1.5" stroke-dasharray="8,4"/>
  <polygon points="130,273 124,283 136,283" fill="#2E8B57"/>
  <text x="700" y="360" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#2E8B57" text-anchor="middle" font-style="italic">Learning reshapes future optimizer state</text>

  <!-- ========================================= -->
  <!-- DIVIDER -->
  <!-- ========================================= -->

  <line x1="80" y1="395" x2="1320" y2="395" stroke="#8A94A6" stroke-width="0.6" opacity="0.25"/>

  <!-- ========================================= -->
  <!-- BOTTOM: Source Artifacts -->
  <!-- ========================================= -->

  <text x="700" y="425" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" fill="#8A94A6" text-anchor="middle">Source Artifacts</text>
  <text x="700" y="443" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" fill="#8A94A6" text-anchor="middle" font-style="italic">Documents provide evidence and context — they support reasoning, but do not preserve it</text>

  <!-- Artifact pills — evenly spaced -->
  <rect x="100" y="465" width="140" height="34" rx="17" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1"/>
  <text x="170" y="487" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle">documents</text>

  <rect x="270" y="465" width="120" height="34" rx="17" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1"/>
  <text x="330" y="487" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle">policies</text>

  <rect x="420" y="465" width="140" height="34" rx="17" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1"/>
  <text x="490" y="487" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle">dashboards</text>

  <rect x="590" y="465" width="100" height="34" rx="17" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1"/>
  <text x="640" y="487" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle">notes</text>

  <rect x="720" y="465" width="150" height="34" rx="17" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1"/>
  <text x="795" y="487" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle">postmortems</text>

  <rect x="900" y="465" width="120" height="34" rx="17" fill="#FFFFFF" stroke="#8A94A6" stroke-width="1"/>
  <text x="960" y="487" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle">metrics</text>

  <!-- Simplified dashed arrows — vertical only, no crossings -->
  <!-- documents → Premise Stack (directly above) -->
  <line x1="170" y1="465" x2="310" y2="273" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- policies → Decision State -->
  <line x1="330" y1="465" x2="540" y2="273" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- dashboards → Investigation Trace -->
  <line x1="490" y1="465" x2="770" y2="273" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- notes → Premise Stack -->
  <line x1="640" y1="465" x2="400" y2="273" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- postmortems → Learning Event -->
  <line x1="795" y1="465" x2="1042" y2="273" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- metrics → Investigation Trace -->
  <line x1="960" y1="465" x2="860" y2="273" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- ========================================= -->
  <!-- CONTRAST STATEMENT — lightened -->
  <!-- ========================================= -->

  <text x="700" y="545" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" fill="#102033" text-anchor="middle">
    The unit of organizational reasoning is not the document.
  </text>
  <text x="700" y="565" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" fill="#102033" text-anchor="middle" font-weight="bold">
    It is the optimizer state transition.
  </text>

  <!-- Caption -->
  <text x="700" y="610" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">Documents provide evidence and context.</text>
  <text x="700" y="628" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">Reasoning objects preserve how that evidence shaped action and learning.</text>

  <!-- ========================================= -->
  <!-- COMPACT LEGEND -->
  <!-- ========================================= -->

  <text x="340" y="690" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6">
    <tspan font-weight="bold">—→</tspan> state transition
  </text>
  <text x="580" y="690" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6">
    <tspan font-weight="bold">- - →</tspan> evidence / context
  </text>
  <text x="840" y="690" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#2E8B57">
    <tspan font-weight="bold">- - →</tspan> learning feedback
  </text>

</svg>
