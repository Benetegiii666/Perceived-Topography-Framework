<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" width="1400" height="820">
  <title>Figure 7 — Runtime Discovery Loop</title>
  <desc>Runtime discovery reduces user burden by retrieving and inferring before asking. The output is not only generated content, but preserved reasoning state that can be learned from later.</desc>

  <rect width="1400" height="820" fill="#F7F9FC"/>
  <text x="700" y="40" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="bold" fill="#102033" text-anchor="middle">Runtime Discovery Loop</text>

  <!-- ====== MAIN FLOW (horizontal) ====== -->

  <!-- Messy Human Intent (cloud-like) -->
  <ellipse cx="105" cy="170" rx="85" ry="50" fill="#FFFFFF" stroke="#8A94A6" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="105" y="162" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#102033" text-anchor="middle">Messy Human</text>
  <text x="105" y="180" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" font-weight="bold" fill="#102033" text-anchor="middle">Intent</text>
  <text x="105" y="240" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle" font-style="italic">"I want to do a</text>
  <text x="105" y="255" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle" font-style="italic">healthcare campaign."</text>

  <line x1="190" y1="170" x2="218" y2="170" stroke="#102033" stroke-width="2"/>
  <polygon points="225,170 215,164 215,176" fill="#102033"/>

  <!-- Retrieve -->
  <rect x="228" y="140" width="125" height="60" rx="10" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="290" y="175" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Retrieve</text>

  <line x1="353" y1="170" x2="378" y2="170" stroke="#102033" stroke-width="2"/>
  <polygon points="385,170 375,164 375,176" fill="#102033"/>

  <!-- Infer -->
  <rect x="388" y="140" width="115" height="60" rx="10" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="445" y="175" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Infer</text>

  <line x1="503" y1="170" x2="528" y2="170" stroke="#102033" stroke-width="2"/>
  <polygon points="535,170 525,164 525,176" fill="#102033"/>

  <!-- Propose -->
  <rect x="538" y="140" width="125" height="60" rx="10" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="600" y="175" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Propose</text>

  <line x1="663" y1="170" x2="688" y2="170" stroke="#102033" stroke-width="2"/>
  <polygon points="695,170 685,164 685,176" fill="#102033"/>

  <!-- Confirm -->
  <rect x="698" y="140" width="125" height="60" rx="10" fill="#EAF1FF" stroke="#D89A21" stroke-width="2"/>
  <text x="760" y="175" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Confirm</text>

  <line x1="823" y1="170" x2="848" y2="170" stroke="#102033" stroke-width="2"/>
  <polygon points="855,170 845,164 845,176" fill="#102033"/>

  <!-- Generate -->
  <rect x="858" y="140" width="125" height="60" rx="10" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="920" y="175" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Generate</text>

  <line x1="983" y1="170" x2="1008" y2="170" stroke="#102033" stroke-width="2"/>
  <polygon points="1015,170 1005,164 1005,176" fill="#102033"/>

  <!-- Preserve -->
  <rect x="1018" y="140" width="125" height="60" rx="10" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="1080" y="175" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#102033" text-anchor="middle">Preserve</text>

  <line x1="1143" y1="170" x2="1168" y2="170" stroke="#102033" stroke-width="2"/>
  <polygon points="1175,170 1165,164 1165,176" fill="#102033"/>

  <!-- Learn -->
  <rect x="1178" y="140" width="115" height="60" rx="10" fill="#EAF1FF" stroke="#2E8B57" stroke-width="2"/>
  <text x="1235" y="175" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2E8B57" text-anchor="middle">Learn</text>

  <!-- Step descriptions -->
  <text x="290" y="125" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">artifacts, model</text>
  <text x="290" y="135" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">updates, policies</text>

  <text x="445" y="125" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">goal, ICP,</text>
  <text x="445" y="135" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">constraints</text>

  <text x="600" y="125" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">strawman,</text>
  <text x="600" y="135" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">confidence</text>

  <text x="760" y="125" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#D89A21" text-anchor="middle">material</text>
  <text x="760" y="135" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#D89A21" text-anchor="middle">questions only</text>

  <text x="920" y="125" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">brief, assets,</text>
  <text x="920" y="135" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">measurement</text>

  <text x="1080" y="125" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">reasoning</text>
  <text x="1080" y="135" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#8A94A6" text-anchor="middle">objects</text>

  <text x="1235" y="125" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#2E8B57" text-anchor="middle">outcome,</text>
  <text x="1235" y="135" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#2E8B57" text-anchor="middle">model update</text>

  <!-- ====== DIVIDER ====== -->
  <line x1="80" y1="300" x2="1320" y2="300" stroke="#8A94A6" stroke-width="0.6" opacity="0.25"/>
  <text x="700" y="330" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#102033" text-anchor="middle">Reasoning Objects Produced</text>

  <!-- ====== OUTPUT OBJECTS ROW ====== -->

  <rect x="40" y="355" width="160" height="55" rx="12" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="120" y="380" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Optimizer</text>
  <text x="120" y="396" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">State</text>

  <rect x="220" y="355" width="160" height="55" rx="12" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="300" y="380" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Premise</text>
  <text x="300" y="396" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Stack</text>

  <rect x="400" y="355" width="160" height="55" rx="12" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="480" y="380" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Decision</text>
  <text x="480" y="396" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">State</text>

  <rect x="580" y="355" width="170" height="55" rx="12" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2"/>
  <text x="665" y="380" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Investigation</text>
  <text x="665" y="396" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Trace</text>

  <rect x="770" y="355" width="150" height="55" rx="12" fill="#FFFFFF" stroke="#D89A21" stroke-width="2"/>
  <text x="845" y="380" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Learning</text>
  <text x="845" y="396" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Event</text>

  <rect x="940" y="355" width="170" height="55" rx="12" fill="#FFFFFF" stroke="#2E8B57" stroke-width="2"/>
  <text x="1025" y="380" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Model Update</text>
  <text x="1025" y="396" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Object</text>

  <rect x="1130" y="355" width="180" height="55" rx="12" fill="#FFFFFF" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="1220" y="380" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Discovery Pattern</text>
  <text x="1220" y="396" font-family="Inter, Helvetica, Arial, sans-serif" font-size="12" font-weight="bold" fill="#102033" text-anchor="middle">Update</text>

  <!-- Vertical dashed arrows from main flow to output objects -->
  <!-- Infer → Optimizer State + Premise Stack -->
  <line x1="445" y1="200" x2="120" y2="355" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="445" y1="200" x2="300" y2="355" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Confirm → Decision State -->
  <line x1="760" y1="200" x2="480" y2="355" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Preserve → Investigation Trace + Decision State -->
  <line x1="1080" y1="200" x2="665" y2="355" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.45"/>

  <!-- Learn → Learning Event + MUO + Discovery Pattern -->
  <line x1="1235" y1="200" x2="845" y2="355" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.45"/>
  <line x1="1235" y1="200" x2="1025" y2="355" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.45"/>
  <line x1="1235" y1="200" x2="1220" y2="355" stroke="#8A94A6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.45"/>

  <!-- Caption -->
  <text x="700" y="470" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">Runtime discovery reduces user burden by retrieving and inferring before asking.</text>
  <text x="700" y="490" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">The output is not only generated content, but preserved reasoning state</text>
  <text x="700" y="510" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">that can be learned from later.</text>
</svg>
