<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <title>Figure 3 — Optimizer in a Perceived Topography</title>
  <desc>The optimizer does not move through objective reality directly. It moves through a perceived topography shaped by what is visible, accessible, represented, trusted, and connected. Behavior emerges from the interaction between optimizer state and perceived landscape.</desc>

  <!-- Background -->
  <rect width="1400" height="900" fill="#F7F9FC"/>

  <!-- Title -->
  <text x="700" y="45" font-family="Inter, Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#102033" text-anchor="middle">Optimizer in a Perceived Topography</text>

  <!-- ========================================= -->
  <!-- LEFT REGION: Optimizer State -->
  <!-- ========================================= -->

  <!-- Optimizer State box -->
  <rect x="40" y="120" width="300" height="380" rx="16" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="2.5"/>
  <text x="190" y="155" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#102033" text-anchor="middle">Optimizer State</text>

  <!-- Goal -->
  <rect x="65" y="180" width="250" height="80" rx="10" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="1.5"/>
  <text x="190" y="210" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#102033" text-anchor="middle">Goal</text>
  <text x="190" y="235" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle">What am I trying to achieve?</text>

  <!-- Policy -->
  <rect x="65" y="275" width="250" height="80" rx="10" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="1.5"/>
  <text x="190" y="305" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#102033" text-anchor="middle">Policy</text>
  <text x="190" y="330" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle">What constraints govern behavior?</text>

  <!-- Interpretation -->
  <rect x="65" y="370" width="250" height="80" rx="10" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="1.5"/>
  <text x="190" y="400" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#102033" text-anchor="middle">Interpretation</text>
  <text x="190" y="425" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6" text-anchor="middle">What does this information mean?</text>

  <!-- ========================================= -->
  <!-- CENTER REGION: Perceived Topography -->
  <!-- ========================================= -->

  <!-- Topography background with contour-like appearance -->
  <rect x="400" y="90" width="560" height="500" rx="20" fill="#EAF1FF" stroke="#2E5EAA" stroke-width="2" stroke-dasharray="none"/>

  <!-- Contour/field lines to suggest landscape -->
  <ellipse cx="680" cy="340" rx="250" ry="200" fill="none" stroke="#2E5EAA" stroke-width="0.6" opacity="0.25"/>
  <ellipse cx="680" cy="340" rx="200" ry="160" fill="none" stroke="#2E5EAA" stroke-width="0.6" opacity="0.2"/>
  <ellipse cx="680" cy="340" rx="150" ry="120" fill="none" stroke="#2E5EAA" stroke-width="0.6" opacity="0.15"/>
  <ellipse cx="680" cy="340" rx="100" ry="80" fill="none" stroke="#2E5EAA" stroke-width="0.6" opacity="0.1"/>

  <!-- Additional contour lines for landscape feel -->
  <path d="M 430 200 Q 580 170 730 210 Q 880 250 930 200" fill="none" stroke="#2E5EAA" stroke-width="0.5" opacity="0.2"/>
  <path d="M 430 300 Q 560 260 700 290 Q 840 320 930 280" fill="none" stroke="#2E5EAA" stroke-width="0.5" opacity="0.18"/>
  <path d="M 430 400 Q 550 370 680 390 Q 810 410 930 380" fill="none" stroke="#2E5EAA" stroke-width="0.5" opacity="0.15"/>
  <path d="M 430 480 Q 570 450 700 470 Q 830 490 930 460" fill="none" stroke="#2E5EAA" stroke-width="0.5" opacity="0.12"/>

  <!-- Topography title -->
  <text x="680" y="125" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#102033" text-anchor="middle">Perceived Topography</text>

  <!-- Five dimensions as rounded pills -->
  <rect x="440" y="160" width="480" height="44" rx="22" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="1.2"/>
  <text x="460" y="187" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2E5EAA">Visibility</text>
  <text x="620" y="187" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6">Can this be perceived?</text>

  <rect x="440" y="218" width="480" height="44" rx="22" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="1.2"/>
  <text x="460" y="245" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2E5EAA">Accessibility</text>
  <text x="640" y="245" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6">Can this be reached?</text>

  <rect x="440" y="276" width="480" height="44" rx="22" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="1.2"/>
  <text x="460" y="303" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2E5EAA">Representation</text>
  <text x="660" y="303" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6">How is this expressed?</text>

  <rect x="440" y="334" width="480" height="44" rx="22" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="1.2"/>
  <text x="460" y="361" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2E5EAA">Confidence</text>
  <text x="625" y="361" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6">How trustworthy is this?</text>

  <rect x="440" y="392" width="480" height="44" rx="22" fill="#FFFFFF" stroke="#2E5EAA" stroke-width="1.2"/>
  <text x="460" y="419" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" font-weight="bold" fill="#2E5EAA">Connectivity</text>
  <text x="640" y="419" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#8A94A6">What is this connected to?</text>

  <!-- Policy boundary/guardrail around topography -->
  <rect x="390" y="82" width="580" height="518" rx="24" fill="none" stroke="#8A94A6" stroke-width="3" stroke-dasharray="12,6"/>
  <text x="690" y="585" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">Policy boundary — constraints govern what the optimizer may do</text>

  <!-- ========================================= -->
  <!-- RIGHT REGION: Motion -->
  <!-- ========================================= -->

  <!-- Motion box -->
  <rect x="1040" y="120" width="310" height="380" rx="16" fill="#FFFFFF" stroke="#2E8B57" stroke-width="2.5"/>
  <text x="1195" y="155" font-family="Inter, Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="#102033" text-anchor="middle">Motion</text>

  <!-- Attraction -->
  <rect x="1065" y="180" width="260" height="58" rx="10" fill="#EAF1FF" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="1195" y="215" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#102033" text-anchor="middle">Attraction</text>

  <!-- Arrow down -->
  <line x1="1195" y1="238" x2="1195" y2="255" stroke="#2E8B57" stroke-width="2"/>
  <polygon points="1195,262 1189,252 1201,252" fill="#2E8B57"/>

  <!-- Investigation -->
  <rect x="1065" y="265" width="260" height="58" rx="10" fill="#EAF1FF" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="1195" y="300" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#102033" text-anchor="middle">Investigation</text>

  <!-- Arrow down -->
  <line x1="1195" y1="323" x2="1195" y2="340" stroke="#2E8B57" stroke-width="2"/>
  <polygon points="1195,347 1189,337 1201,337" fill="#2E8B57"/>

  <!-- Sufficiency -->
  <rect x="1065" y="350" width="260" height="58" rx="10" fill="#EAF1FF" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="1195" y="385" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#102033" text-anchor="middle">Sufficiency</text>

  <!-- Arrow down -->
  <line x1="1195" y1="408" x2="1195" y2="425" stroke="#2E8B57" stroke-width="2"/>
  <polygon points="1195,432 1189,422 1201,422" fill="#2E8B57"/>

  <!-- Action -->
  <rect x="1065" y="435" width="260" height="58" rx="10" fill="#2E8B57" stroke="#2E8B57" stroke-width="1.5"/>
  <text x="1195" y="470" font-family="Inter, Helvetica, Arial, sans-serif" font-size="17" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Action</text>

  <!-- ========================================= -->
  <!-- FLOW ARROWS: Optimizer → Topography → Motion -->
  <!-- ========================================= -->

  <!-- Primary flow: Optimizer State → Topography -->
  <line x1="340" y1="310" x2="390" y2="310" stroke="#102033" stroke-width="2.5"/>
  <polygon points="397,310 387,304 387,316" fill="#102033"/>

  <!-- Primary flow: Topography → Motion -->
  <line x1="970" y1="310" x2="1033" y2="310" stroke="#102033" stroke-width="2.5"/>
  <polygon points="1040,310 1030,304 1030,316" fill="#102033"/>

  <!-- ========================================= -->
  <!-- OVERLAY: Goal Relevance projection -->
  <!-- ========================================= -->

  <!-- Dashed arrow from Goal to topography center (projection/filter) -->
  <path d="M 315 220 Q 370 200 440 250" fill="none" stroke="#D89A21" stroke-width="2" stroke-dasharray="8,4"/>
  <polygon points="445,253 435,243 439,256" fill="#D89A21"/>
  <text x="370" y="195" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#D89A21" text-anchor="middle" font-style="italic">Goal Relevance</text>
  <text x="370" y="210" font-family="Inter, Helvetica, Arial, sans-serif" font-size="11" fill="#D89A21" text-anchor="middle">(projection / filter)</text>

  <!-- ========================================= -->
  <!-- BOTTOM REGION: Labels and equation -->
  <!-- ========================================= -->

  <!-- Equation bar -->
  <rect x="80" y="660" width="1240" height="70" rx="12" fill="#FFFFFF" stroke="#102033" stroke-width="1.5"/>

  <text x="700" y="700" font-family="Inter, Helvetica, Arial, sans-serif" font-size="18" fill="#102033" text-anchor="middle">
    <tspan font-weight="bold">Optimizer</tspan>
    <tspan> (Goal, Policy, Interpretation)</tspan>
    <tspan>  +  </tspan>
    <tspan font-weight="bold">Topography</tspan>
    <tspan> (Visibility, Accessibility, Representation, Confidence, Connectivity)</tspan>
    <tspan>  =  </tspan>
    <tspan font-weight="bold">Behavior</tspan>
  </text>

  <!-- Caption -->
  <text x="700" y="780" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" fill="#8A94A6" text-anchor="middle" font-style="italic">The optimizer does not move through objective reality directly.</text>
  <text x="700" y="800" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" fill="#8A94A6" text-anchor="middle" font-style="italic">It moves through a perceived topography shaped by what is visible, accessible, represented, trusted, and connected.</text>
  <text x="700" y="820" font-family="Inter, Helvetica, Arial, sans-serif" font-size="15" fill="#8A94A6" text-anchor="middle" font-style="italic">Behavior emerges from the interaction between optimizer state and perceived landscape.</text>

  <!-- Region labels -->
  <text x="190" y="530" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">What the system brings</text>
  <text x="680" y="620" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">What the system navigates</text>
  <text x="1195" y="530" font-family="Inter, Helvetica, Arial, sans-serif" font-size="14" fill="#8A94A6" text-anchor="middle" font-style="italic">How behavior emerges</text>

</svg>
