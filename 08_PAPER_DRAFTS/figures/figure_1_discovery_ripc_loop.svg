<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="Helvetica, Arial, sans-serif">
  <rect width="720" height="520" fill="white"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">Figure 1. Discovery (RIPC) Loop</text>
  <text x="360" y="52" text-anchor="middle" font-size="12" fill="#555" font-style="italic">Discovery is pre-action topography design.</text>

  <!-- Retrieve box -->
  <rect x="80" y="80" width="160" height="70" rx="10" ry="10" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="160" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Retrieve</text>
  <text x="160" y="128" text-anchor="middle" font-size="11" fill="#555">collect available context</text>

  <!-- Infer box -->
  <rect x="480" y="80" width="160" height="70" rx="10" ry="10" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="560" y="108" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Infer</text>
  <text x="560" y="128" text-anchor="middle" font-size="11" fill="#555">form a working frame</text>

  <!-- Propose box -->
  <rect x="480" y="220" width="160" height="70" rx="10" ry="10" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="560" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Propose</text>
  <text x="560" y="268" text-anchor="middle" font-size="11" fill="#555">show the inferred frame</text>

  <!-- Confirm box -->
  <rect x="80" y="220" width="160" height="70" rx="10" ry="10" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="160" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Confirm</text>
  <text x="160" y="268" text-anchor="middle" font-size="11" fill="#555">confirm, revise, or bound</text>

  <!-- Arrows: Retrieve → Infer -->
  <line x1="240" y1="115" x2="475" y2="115" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Arrows: Infer → Propose -->
  <line x1="560" y1="150" x2="560" y2="215" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Arrows: Propose → Confirm -->
  <line x1="480" y1="255" x2="245" y2="255" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Arrows: Confirm → Retrieve (re-entry) -->
  <path d="M 80 255 Q 40 255 40 190 Q 40 115 75 115" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowhead)"/>
  <text x="22" y="188" text-anchor="middle" font-size="9" fill="#555" transform="rotate(-90,22,188)">re-entry</text>

  <!-- Output arrow from Confirm -->
  <line x1="160" y1="290" x2="160" y2="340" stroke="#333" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Confirmed Optimizer State box -->
  <rect x="60" y="345" width="200" height="65" rx="10" ry="10" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="160" y="370" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Confirmed Optimizer State</text>
  <text x="160" y="392" text-anchor="middle" font-size="11" fill="#555">Goal · Policy · Interpretation</text>

  <!-- Bottom callouts -->
  <rect x="340" y="355" width="200" height="30" rx="6" ry="6" fill="white" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="440" y="375" text-anchor="middle" font-size="10" fill="#666">If skipped: silent inference</text>

  <rect x="340" y="395" width="200" height="30" rx="6" ry="6" fill="white" stroke="#999" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="440" y="415" text-anchor="middle" font-size="10" fill="#666">If overdone: blank-form burden</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
</svg>